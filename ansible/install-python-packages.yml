---
# Playbook to install Python packages on Linux servers
- name: Install Python Packages
  hosts: linux_servers
  become: yes  # Run with sudo privileges
  gather_facts: yes  # Collect system information

  vars:
    python_version: "python3"
    pip_command: "pip3"

  tasks:
    # Update package manager cache
    - name: Update apt cache (Debian/Ubuntu)
      apt:
        update_cache: yes
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"

    - name: Update yum cache (RedHat/CentOS)
      yum:
        name: '*'
        state: latest
      when: ansible_os_family == "RedHat"

    # Install Python and pip if not present
    - name: Install Python 3 and pip (Debian/Ubuntu)
      apt:
        name:
          - python3
          - python3-pip
          - python3-venv
        state: present
      when: ansible_os_family == "Debian"

    - name: Install Python 3 and pip (RedHat/CentOS)
      yum:
        name:
          - python3
          - python3-pip
        state: present
      when: ansible_os_family == "RedHat"

    # Upgrade pip
    - name: Upgrade pip
      pip:
        name: pip
        state: latest
        executable: "{{ pip_command }}"

    # Install Python packages from requirements file
    - name: Install Python packages from requirements.txt
      pip:
        requirements: "{{ playbook_dir }}/files/python-requirements.txt"
        executable: "{{ pip_command }}"
        state: present
      register: pip_install_result

    # Display installation results
    - name: Display pip installation results
      debug:
        msg: "{{ pip_install_result }}"

    # Optional: Verify installations
    - name: List installed packages
      shell: "{{ pip_command }} list"
      register: pip_list
      changed_when: false

    - name: Display installed packages
      debug:
        msg: "{{ pip_list.stdout_lines }}"

